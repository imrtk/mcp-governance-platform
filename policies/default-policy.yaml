apiVersion: governance.toolkit/v2
defaultAction: deny
name: platform-default-policy
rules:
- action: allow
  condition: tool_name in ["vcenter_list_vms", "vcenter_vm_status", "vcenter_power_on", "vcenter_power_off", "vcenter_reset_vm", "vcenter_ensure_running", "vcenter_vm_info", "vcenter_cluster_resources", "vcenter_list_datastores", "vcenter_list_hosts", "vcenter_create_snapshot", "vcenter_deploy_vm", "vcenter_datastore_usage", "vcenter_vm_summary"]
  message: vCenter VM management tools
  name: allow-vcenter
- action: allow
  condition: tool_name in ["ask"]
  message: Orchestrator ask tool
  name: allow-orchestrator
- action: allow
  condition: tool_name in ["check_vms", "status"]
  message: Monitor agent tools
  name: allow-monitor
- action: allow
  condition: tool_name in ["pgsql_query", "pgsql_insert_alert", "pgsql_get_alerts", "pgsql_list_tables", "pgsql_describe_table", "pgsql_admin_exec"]
  message: PostgreSQL database tools
  name: allow-pgsql
- action: deny
  condition: params contains "init 0" or params contains "init 6" or params contains
    "sudo init" or params contains "rm -rf" or params contains "shutdown" or params
    contains "poweroff" or params contains "halt" or params contains "sudo poweroff"
    or params contains "sudo shutdown" or params contains "sudo halt" or params contains
    "sudo reboot" or params contains "||" or params contains "&&"
  message: Destructive action blocked by central policy
  name: block-destructive-actions
- action: log
  condition: true
  name: audit-all-calls
- action: deny
  condition: agent_call_count > 100
  message: 'Rate limit exceeded: max 100 calls per agent'
  name: rate-limit-agents
version: 1.0.0
